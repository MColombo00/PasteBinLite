<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteBin-Lite</title>
</head>

<body>

    <div class="container">Paste your text to get a link!</div>
    <br>

    <div>
        <textarea id="pasteInput" placeholder="Enter your text here..." rows="10" cols="50"></textarea>
    </div>
    <br>

    <div class="container">
        <button id="submitBtn">Submit Text</button>
    </div>

    <div id="result"></div>

    <script src="script.js"></script>

</body>
</html>
